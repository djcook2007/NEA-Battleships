<!--Telling the browser what type of html it is-->
<!DOCTYPE html>
<!--Creates the html and header-->
<html>
<head>
    <!-- Common head tags -->
    {% include 'partials/head-assets.html' %}

    <!--Makes the name of the web page-->
    <title>Single Player</title>

    <!-- Link to the image for the home screen -->
    <style>
        body{
            background-image: url("{{ url_for('static', filename='img/homescreens/sea2.png') }}");
        }
    </style>

<!--Closes the header-->
</head>

<!--Opens the body-->
<body>
    <!--Creates, colours, styles and closes the title-->
    <h1 style="color: chartreuse; text-align: center; font-size: 500%;">Single Player</h1>
    
    <!--form for going back to the home screen, which is why the method for the '/' route required both post and get-->
    <form action="/" method="post">

        <input type="hidden" name="gameId" value="{{gameId}}"/>
        <button type="submit">Home</button>

    <!--Closing tags-->
    </form>

    <!--form for submiting future data to the setup-->
    <form action="/setup" method="post">
        
        <!--Tells my program which page I came from-->
        <input type="hidden" name="previous-page" value="single-player"/>
        <input type="hidden" name="robot" value="easy"/>
        <input type="hidden" name="gameId" value="{{gameId}}"/>
        <input type="hidden" name="units" value="{{units}}"/>
        <input type="hidden" name="gridSize" value="{{gridSize}}"/>

        <!--Submit button to take you to the next page (the setup html)-->
        <button type="submit">Easy</button>
    
    <!--Closing tag-->
    </form>

    <!--form for submiting future data to the setup-->
    <form action="/setup" method="post">
        
        <!--Tells my program which page I came from-->
        <input type="hidden" name="previous-page" value="single-player"/>
        <input type="hidden" name="robot" value="easy"/>
        <input type="hidden" name="gameId" value="{{gameId}}"/>
        <input type="hidden" name="units" value="{{units}}"/>
        <input type="hidden" name="gridSize" value="{{gridSize}}"/>
        
        <!--Submit button to take you to the next page (the setup html)-->
        <button type="submit">Medium</button>
    
    <!--Closing tag-->
    </form>

    <!--form for submiting future data to the setup-->
    <form action="/setup" method="post">
        
        <!--Tells my program which page I came from-->
        <input type="hidden" name="previous-page" value="single-player"/>
        <input type="hidden" name="robot" value="easy"/>
        <input type="hidden" name="gameId" value="{{gameId}}"/>
        <input type="hidden" name="units" value="{{units}}"/>
        <input type="hidden" name="gridSize" value="{{gridSize}}"/>
        
        <!--Submit button to take you to the next page (the setup html)-->
        <button type="submit">Hard</button>
    
    <!--Closing tag-->
    </form>
    
</body>
</html>
