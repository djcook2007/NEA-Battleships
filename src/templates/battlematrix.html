<!--Telling the browser what type of html it is-->
<!DOCTYPE html>
<!--Creates the html and header-->
<html>
<head>
    <!-- Common head tags -->
    {% include 'partials/head-assets.html' %}

    <!--Makes the name of the web page-->
    <title>Gameplay</title>

    <!-- Colours the button after clicked -->
    <style>    
        /* Link to the image for the home screen */
        body{
            background-image: url("{{ url_for('static', filename='img/homescreens/seaGameplay.png') }}");
        }
        /* Makes the square clicked red if the response returns with hit */
        .game-board .hit {
            background-color: red;
        }
        /* Makes the square clicked black if the response returns with sunk */
        .game-board .sunk {
            background-color: black;
        }
        /* Makes the square clicked green if the response returns with miss */
        .game-board .miss {
            background-color: green;
        }
        .game-board button {
            background-color: color-mix(in srgb, white 40%, transparent);
            border-color: white;
        }
        .game-board td, .game-board th {
            color: white;
        }
        h2 {
            color: white;
        }
    </style>
<!--Closes the header-->
</head>

<!--Opens the body-->
<body>

    <div class="container-fluid min-vh-100"> <!--How the styles start working-->
        <div class="row mb-4 pt-4">
            <div class="col-3 d-flex align-items-centre gap-2">
                <!--Creates a button that the user can click that will make the function on javascript run-->
                <button onclick="toggleFullscreen(this)">
                    <i class="bi bi-arrows-fullscreen"></i>
                </button>
                <!--A form that makes you go all the way back to the home screen by pressing quit-->
                <form action="/" method="post">
                    <input type="hidden" name="gameId" value="{{gameId}}"/>
                    <button type="submit" class="btn">Home</button>
                </form>
            </div>
        </div>

        <!-- These messages will only appear once the user or robot has won -->
        <div class="modal fade" id="win-message-user">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        Congratulations, You win!
                    </div>
                    <div class="modal-footer">
                        <form action="/" method="post">
                            <input type="hidden" name="gameId" value="{{gameId}}"/>
                            <button type="submit">Home</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="win-message-opponent">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        You lost!
                    </div>
                    <div class="modal-footer">
                        <form action="/" method="post">
                            <input type="hidden" name="gameId" value="{{gameId}}"/>
                            <button type="submit">Home</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-xxl-center column-gap-xxl-5">   <!--Making a bootstrap row for laying out-->
            <div class="col-12 col-sm-6 col-xxl-4">    <!-- To make the formatting correct for the grid -->
                <h2>Opponent's Board</h2>
                <div class="game-board opponent">    <!--So the javascript find this table-->
                    <table class="table">   <!--Making a bootstrap table that will hold the board-->
                    </table>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xxl-4">    <!-- To make the formatting correct for the grid -->
                <h2>My Board</h2>
                <div class="game-board user">
                    <table class="table"></table>
                </div>            
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = Number("{{ gridSize }}");   //Passing the python variable gridSize to JavaScript
        const GAME_ID = "{{ gameId }}";     //Passing the python varibale gameId to JavaScript
        let fullscreen = false;
    </script>   

    <!-- Common scripts -->
    {% include 'partials/scripts.html' %}

<!--Some more closing tags-->
</body>
</html>
